services:
  discord-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: discord-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Required
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      # Optional - with defaults
      - COMMAND_PREFIX=${COMMAND_PREFIX:-!}
      - BOT_NAME=${BOT_NAME:-Discord Bot}
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_PROVIDER=${LOG_PROVIDER:-winston}
      # Optional
      - GUILD_ID=${GUILD_ID:-}
      - CLIENT_ID=${CLIENT_ID:-}
      - SUPPORT_URL=${SUPPORT_URL:-}
      - DATA_DIR=${DATA_DIR:-data}
    volumes:
      # Persist logs outside container
      - ./apps/discord-bot/logs:/app/apps/discord-bot/logs
      # Persist guild config JSON outside container
      - ./apps/discord-bot/data:/app/apps/discord-bot/data
    networks:
      - discord-bot-network

networks:
  discord-bot-network:
    driver: bridge
